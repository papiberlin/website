- title_en: Lachlabor - Funny Knowledge for Kids to Guess Along
  title_de: Lachlabor - Lustiges Wissen für Kinder zum Miträtseln
  description_de: "Tina und Mischa beantworten im Lachlabor die verrücktesten Kinderfragen: Kann man in geschmolzener Schokolade schwimmen? Macht ein Känguru-Baby auch mal in den Beutel der Mama? Oder: Kann man Wolken wegpusten? Die beiden machen lustige Experimente, und bekommen auf ihrer Suche nach Wissen und Antworten Hilfe vom Kinder-Miträtsel-Team und von Expertinnen und Experten."
  description_en: "Tina and Mischa answer the craziest kids' questions in the Laugh Lab: Can you swim in melted chocolate? Does a kangaroo baby ever go in its mom's pouch? Or: Can you blow clouds away? The two conduct funny experiments and get help in their quest for knowledge and answers from the kids' guessing team and from experts."
  url: https://www.br.de/mediathek/podcast/lachlabor/515
  categories: ["podcast-kids"]
  age: 5-8
  lang: ["de"]

- title_de: Anna und die wilden Tiere
  title_en: Anna und die wilden Tiere
  description_de: "Ihr kennt \"Anna und die wilden Tiere\" aus dem Fernsehen? Auch hier im Podcast kommt Anna wilden Tieren ganz nah - egal ob Pferden, Haien, Elefanten oder Schlangen. Ihr erfahrt dabei vieles über Tiere, das ihr garantiert noch nicht wusstet - zum Beispiel über superstarke Abwehrtechniken gegenüber Feinden oder mit welchen schlauen Mitteln sie an ihr Lieblingsfutter gelangen. Und an Annas Seite ist immer: die Hyäne. Sie erzählt Witze, puh, die sind manchmal richtig schlecht und ... ach, hört einfach rein!"
  description_en: "You know 'Anna und die wilden Tiere' from television? Here in the podcast, Anna gets up close with wild animals – whether it's horses, sharks, elephants, or snakes. You'll learn a lot about animals that you definitely didn't know – for example, about super-strong defense techniques against enemies or clever methods they use to get their favorite food. And by Anna's side is always: the hyena. She tells jokes, well, they're sometimes really bad, and... oh, just listen in!"
  url: https://www.br.de/mediathek/podcast/anna-und-die-wilden-tiere/858
  categories: ["podcast-kids"]
  age: 6-10
  lang: ["de"]

- title_de: artgerecht – der andere Elternpodcast
  title_en: artgerecht – der andere Elternpodcast
  description_de: Eine schöne Kindheit für unsere Kinder ist ja gut und schön – aber wie schaffen wir es, uns selbst dabei nicht zu verlieren? Wie kommen wir gut durch die wohl herausforderndste Zeit unseres Lebens?  Schnapp‘ dir ein Kissen und setze dich zu uns ans artgerecht Lagerfeuer. 
  description_en: Providing a beautiful childhood for our children is good and fine – but how do we manage not to lose ourselves in the process? How do we get through the most challenging time of our lives successfully? Grab a cushion and join us by the artgerecht campfire.
  url: https://www.artgerecht-projekt.de/artgerecht-der-andere-elternpodcast/
  categories: ["podcast"]
  lang: ["de"]

- title_de: Familienrat mit Katia Saalfrank
  title_en: Familienrat mit Katia Saalfrank
  description_de: Wie spricht man am besten über Herausforderungen im Familienalltag? Viele Eltern umtreiben dieselben Sorgen, und lesen einen Ratgeber nach dem Anderen. Jeder hat eine andere Idee von Erziehung und nur selten werden Sorgen offen ausgesprochen. Im  Familienrat-Podcast besuchen wir die Diplompädagogin Katia Saalfrank und stellen ihr eure Fragen rund um Erziehung und Familienleben. 
  description_en: How do you best talk about challenges in family life? Many parents share the same concerns and read one parenting guide after another. Everyone has a different idea of parenting, and worries are rarely openly discussed. In the Family Council podcast, we visit the educationalist Katia Saalfrank and ask her your questions about parenting and family life.
  url: https://mitvergnuegen.com/familienrat/
  categories: ["podcast"]
  lang: ["de"]

- title_de: CheckPod - Der Podcast mit Checker Tobi
  title_en: CheckPod - Der Podcast mit Checker Tobi
  description_de:  Der Checker zum Hören! Tobi checkt zusammen mit einem Kind drei Fragen zu einem Wissensthema. Lustige Experimente, kluge Expertinnen und Experten sowie die schlaue Datenbank helfen ihnen dabei. Und am Schluss jeder Folge verrät Checker Tobi ein persönliches Geheimnis. Ob es um Bäume, Märchen oder Schleim geht, im CheckPod macht Wissen Spaß und gute Laune. Alle neuen Folgen gibt es immer eine Woche vorab exklusiv in der ARD-Audiothek! 
  description_en: The checker for listening! Tobi, along with a child, checks three questions on a knowledge topic. Funny experiments, smart experts, and the clever database help them out. And at the end of each episode, Checker Tobi reveals a personal secret. Whether it's about trees, fairy tales, or slime, in CheckPod, knowledge is fun and uplifting. All new episodes are always available exclusively in the ARD Audiothek one week in advance!
  url: https://www.br.de/mediathek/podcast/checkpod-der-podcast-mit-checker-tobi/859
  categories: ["podcast-kids"]
  lang: ["de"]
  age: 5-10

